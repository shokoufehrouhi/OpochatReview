<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Review Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-xl font-bold text-gray-800">Chat Review Dashboard</h1>
        <p class="text-xs text-gray-400">AI Quality Monitor — Persian / English / Arabic</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <input type="date" id="dateFrom" class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        <span class="text-gray-400 text-sm">to</span>
        <input type="date" id="dateTo" class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        <select id="agentFilter" class="text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-300">
          <option value="">All Agents</option>
        </select>
        <button id="btnLoad" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
          Load Chats
        </button>
        <button id="btnRefreshKb" title="Refresh knowledge base from Google Docs/Sheets" class="bg-gray-100 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-200 transition flex items-center gap-1">
          <span>⟳</span> <span id="kbStatus">KB</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Status bar -->
  <div id="statusBar" class="hidden bg-blue-50 border-b border-blue-200 px-6 py-2 text-sm text-blue-700"></div>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Overview cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white rounded-2xl border border-gray-200 p-5">
        <p class="text-xs text-gray-400 uppercase font-semibold mb-1">Total Chats</p>
        <p id="statTotal" class="text-3xl font-black text-blue-600">—</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-200 p-5">
        <p class="text-xs text-gray-400 uppercase font-semibold mb-1">Reviewed</p>
        <p id="statReviewed" class="text-3xl font-black text-purple-600">—</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-200 p-5">
        <p class="text-xs text-gray-400 uppercase font-semibold mb-1">Avg Score</p>
        <p id="statAvg" class="text-3xl font-black text-green-600">—</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-200 p-5">
        <p class="text-xs text-gray-400 uppercase font-semibold mb-1">Resolved</p>
        <p id="statResolved" class="text-3xl font-black text-emerald-600">—</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="bg-white rounded-2xl border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-700 mb-4">Score by Agent</h2>
      <canvas id="agentChart" height="80"></canvas>
    </div>

    <!-- Chat table -->
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <h2 class="text-sm font-semibold text-gray-700">Chats</h2>
        <button id="btnReviewAll" class="hidden text-xs bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700 transition">
          Review All with AI
        </button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Chat ID</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Agent</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Customer</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Date</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Shift</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Lang</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Score</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Resolved</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">Action</th>
            </tr>
          </thead>
          <tbody id="chatTableBody">
            <tr><td colspan="8" class="text-center py-12 text-gray-400">Press "Load Chats" to start</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="hidden flex items-center justify-between px-5 py-3 border-t border-gray-100">
        <span id="pageInfo" class="text-xs text-gray-400"></span>
        <div class="flex gap-2">
          <button id="btnPrev" class="px-3 py-1 text-xs border rounded disabled:opacity-30 hover:bg-gray-50">Prev</button>
          <button id="btnNext" class="px-3 py-1 text-xs border rounded disabled:opacity-30 hover:bg-gray-50">Next</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Chat Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
